<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Photo Dump — Perdido Key</title>
    <meta property="og:title" content="The Photo Dump — Perdido Key">
    <meta property="og:description" content="Every trip photo, unsorted and unfiltered.">
    <meta property="og:image" content="https://acoclr1979.github.io/perdido-key-countdown/Photo-00-PKC.jpeg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            color: white;
        }

        .mosaic-bg {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 25vh);
            z-index: 0;
        }
        .mosaic-bg .mc {
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 200%;
        }
        .mosaic-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 4, 35, 0.86);
            z-index: 1;
        }

        .page-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hero */
        .hero {
            width: 100%;
            max-width: 780px;
            padding: 72px 30px 52px;
            text-align: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 0.75em;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 36px;
            transition: color 0.15s;
        }
        .back-link:hover { color: rgba(255,255,255,0.65); }

        .hero-eyebrow {
            font-size: 0.8em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 14px;
        }

        .hero-title {
            font-size: clamp(3rem, 11vw, 5.5rem);
            font-weight: 900;
            line-height: 1.02;
            letter-spacing: -2px;
            margin-bottom: 16px;
        }

        .hero-sub {
            font-size: 0.9em;
            color: rgba(255,255,255,0.4);
            line-height: 1.65;
        }

        /* Content */
        .content {
            width: 100%;
            max-width: 1100px;
            padding: 0 24px 100px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }

        .gallery-item {
            display: block;
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.25s ease;
        }

        .gallery-item:hover img { transform: scale(1.06); }

        .gallery-item.featured {
            grid-column: span 2;
            grid-row: span 2;
        }

        .gallery-caption {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            padding: 8px 10px 7px;
            font-size: 0.72em;
            color: rgba(255,255,255,0.85);
            background: linear-gradient(0deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 100%);
        }

        @media (max-width: 600px) {
            .hero { padding: 56px 20px 40px; }
            .content { padding: 0 16px 80px; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 7px; }
            .gallery-item.featured { grid-column: span 2; grid-row: span 2; }
        }
    </style>
</head>
