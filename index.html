<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdido Key Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        /* GROUP PHOTO */
        .group-photo {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }

        .group-photo-placeholder {
            width: 100%;
            height: 260px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .group-photo-placeholder .photo-icon {
            font-size: 2.5rem;
        }

        .card-body {
            padding: 40px 40px 50px;
        }

        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 40px;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .countdown-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            color: white;
        }

        .countdown-number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .countdown-label {
            font-size: 0.9em;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quote-container {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            margin-top: 30px;
        }

        .quote-text {
            font-size: 1.3em;
            color: #333;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .quote-emoji {
            font-size: 2em;
            margin: 10px 0;
        }

        @media (max-width: 600px) {
            .card-body {
                padding: 25px 20px 35px;
            }

            h1 {
                font-size: 1.8em;
            }

            .countdown {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .countdown-item {
                padding: 15px;
            }

            .countdown-number {
                font-size: 1.8em;
            }

            .quote-text {
                font-size: 1em;
            }

            .group-photo,
            .group-photo-placeholder {
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- 
            PHOTO: Upload a file named "group-photo.jpg" to your GitHub repo.
            It will appear here automatically. 
            Supported: group-photo.jpg, group-photo.png, group-photo.jpeg
        -->
        <img 
            class="group-photo" 
            src="./IMG_1144.jpeg" 
            alt="The crew" 
            onerror="this.style.display='none'; document.getElementById('photo-placeholder').style.display='flex';"
        />
        <div class="group-photo-placeholder" id="photo-placeholder" style="display:none;">
            <span class="photo-icon">📸</span>
            <span>Upload group-photo.jpg to your repo</span>
        </div>

        <div class="card-body">
            <h1>🏖️ Perdido Key</h1>
            <p class="subtitle">July 11 – 18, 2026</p>

            <div class="countdown">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">0</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">0</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">0</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">0</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>

            <div class="quote-container">
                <div class="quote-emoji" id="emoji">🎉</div>
                <p class="quote-text" id="quote">Loading the good vibes...</p>
            </div>
        </div>
    </div>

    <script>
        const quotes = [
            { text: "Florida: where the sun never stops shining and the fun never ends.", emoji: "☀️" },
            { text: "Friends who vacation together, stay together.", emoji: "👯" },
            { text: "Life is better in flip-flops and with friends by your side.", emoji: "🩴" },
            { text: "Salty air, sandy hair, and friends everywhere.", emoji: "🌊" },
            { text: "A vacation without friends is just a trip. With friends? It's a memory.", emoji: "📸" },
            { text: "Florida: bringing people together one beach day at a time.", emoji: "🏝️" },
            { text: "Good times + crazy friends = amazing memories.", emoji: "✨" },
            { text: "The beach is calling and we must go... together.", emoji: "🐚" },
            { text: "Vitamin Sea and friendship—the best remedy.", emoji: "💙" },
            { text: "Making a splash with your favorite people.", emoji: "💦" }
        ];

        function getRandomQuote() {
            return quotes[Math.floor(Math.random() * quotes.length)];
        }

        function updateCountdown() {
            const targetDate = new Date("July 11, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const difference = targetDate - now;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / 1000 / 60) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            document.getElementById("days").textContent = days;
            document.getElementById("hours").textContent = String(hours).padStart(2, '0');
            document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
            document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
        }

        function displayQuote() {
            const quote = getRandomQuote();
            document.getElementById("quote").textContent = quote.text;
            document.getElementById("emoji").textContent = quote.emoji;
        }

        updateCountdown();
        displayQuote();
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
