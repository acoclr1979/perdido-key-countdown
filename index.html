<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdido Key Countdown</title>
    <meta property="og:image" content="https://acoclr1979.github.io/perdido-key-countdown/Photo-00-PKC.jpeg">
    <meta property="og:title" content="Perdido Key Countdown">
    <meta property="og:description" content="July 11–18, 2026 🏖️">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 30px 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
            flex-shrink: 0;
        }

        .carousel-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .carousel-slide.active { opacity: 1; }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .carousel-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .carousel-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: background 0.3s;
        }

        .carousel-dot.active { background: #ffffff; }

        .card-body {
            padding: 40px 40px 50px;
            flex: 1;
        }

        h1 { font-size: 2.5em; color: #667eea; margin-bottom: 10px; letter-spacing: 1px; }
        .subtitle { font-size: 1.1em; color: #666; margin-bottom: 40px; }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .countdown-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            color: white;
        }

        .countdown-number { font-size: 2.5em; font-weight: bold; display: block; margin-bottom: 5px; }
        .countdown-label { font-size: 0.9em; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }

        .quote-container {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            margin-top: 30px;
        }

        .quote-text { font-size: 1.3em; color: #333; font-style: italic; line-height: 1.6; margin-bottom: 10px; }
        .quote-emoji { font-size: 2em; margin: 10px 0; }

        .food-link-container {
            margin-top: 25px;
            padding: 20px 30px;
            background: linear-gradient(135deg, #f6f8ff 0%, #eef2ff 100%);
            border-radius: 12px;
            border: 1px solid #dde3ff;
        }

        .food-link-label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 8px;
        }

        .food-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            font-size: 1.05em;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .food-link:hover { color: #764ba2; }

        .food-link-arrow {
            font-size: 1.1em;
        }

        /* ===== VREI: Vacation Rick Energy Index ===== */
        .vrei-container {
            margin-top: 25px;
            padding: 25px 30px 30px;
            background: linear-gradient(135deg, #fff7eb 0%, #ffe9d6 100%);
            border-radius: 12px;
            border: 1px solid #ffd9b3;
            text-align: left;
        }

        .vrei-label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3672e;
            margin-bottom: 10px;
            text-align: center;
        }

        .vrei-meter-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .vrei-bar-track {
            flex: 1;
            height: 16px;
            background: rgba(0,0,0,0.08);
            border-radius: 8px;
            overflow: hidden;
        }

        .vrei-bar-fill {
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, #ffb347 0%, #ff5e62 100%);
            transition: width 1s ease-in-out;
            width: 0%;
        }

        .vrei-score {
            font-weight: 800;
            font-size: 1.3em;
            color: #d9480f;
            min-width: 48px;
            text-align: right;
        }

        .vrei-tier {
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.95em;
            color: #d9480f;
            margin-bottom: 16px;
        }

        .vrei-quote-box {
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
            padding: 16px 18px;
            font-style: italic;
            color: #5a3a1e;
            line-height: 1.5;
            font-size: 1.02em;
        }

        .vrei-quote-attribution {
            display: block;
            margin-top: 8px;
            font-style: normal;
            font-weight: 700;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            color: #b3672e;
        }

        @media (max-width: 600px) {
            body { padding: 20px 15px; align-items: flex-start; }
            .card-body { padding: 25px 20px 35px; }
            h1 { font-size: 1.8em; }
            .countdown { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .countdown-item { padding: 15px; }
            .countdown-number { font-size: 1.8em; }
            .quote-text { font-size: 1em; }
            .carousel { height: 220px; }
            .vrei-container { padding: 20px 18px 24px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="carousel" id="carousel">
            <div class="carousel-slide active">
                <img src="./Photo-00-PKC.jpeg" alt="Group photo">
            </div>
            <div class="carousel-slide">
                <img src="./IMG_1144.jpeg" alt="Group photo 1">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-1-PKC.jpeg" alt="Group photo 2">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-2-PKC.jpeg" alt="Group photo 3">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-3-PKC.jpeg" alt="Group photo 4">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-4-PKC.jpeg" alt="Group photo 5">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-5-PKC.jpeg" alt="Group photo 6">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-6-PKC.jpeg" alt="Group photo 7">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-7-PKC.JPEG" alt="Group photo 8">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-8-PKC.jpeg" alt="Group photo 9">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-9-PKC.jpeg" alt="Group photo 10">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-10-PKC.jpeg" alt="Group photo 11">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-11-PKC.jpeg" alt="Group photo 12">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-12-PKC.jpeg" alt="Group photo 13">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-13-PKC.jpeg" alt="Group photo 14">
            </div>
            <div class="carousel-slide">
                <img src="./Photo-14-PKC.jpeg" alt="Group photo 15">
            </div>
            <div class="carousel-dots" id="dots"></div>
        </div>

        <div class="card-body">
            <h1>🏖️ Perdido Key</h1>
            <p class="subtitle">July 11 – 18, 2026</p>

            <div class="countdown">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">0</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">0</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">0</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">0</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>

            <div class="quote-container">
                <div class="quote-emoji" id="emoji">🎉</div>
                <p class="quote-text" id="quote">Loading the good vibes...</p>
            </div>

            <div class="food-link-container">
                <p class="food-link-label">🍽️ Plan ahead</p>
                <a class="food-link" href="https://www.tripadvisor.com/Restaurants-g34551-Perdido_Key_Florida.html" target="_blank">
                    Best Places to Eat Near Perdido Key
                    <span class="food-link-arrow">→</span>
                </a>
            </div>

            <div class="food-link-container">
                <p class="food-link-label">⛅ Weather</p>
                <a class="food-link" href="https://forecast.weather.gov/MapClick.php?CityName=Perdido+Key&state=FL&site=MOB&textField1=30.2927&textField2=-87.5036" target="_blank">
                    Perdido Key 7-Day Forecast
                    <span class="food-link-arrow">→</span>
                </a>
            </div>

            <!-- ===== VREI: Vacation Rick Energy Index ===== -->
            <div class="vrei-container">
                <p class="vrei-label">📈 Vacation Rick Energy Index</p>
                <div class="vrei-meter-row">
                    <div class="vrei-bar-track">
                        <div class="vrei-bar-fill" id="vreiBarFill"></div>
                    </div>
                    <div class="vrei-score" id="vreiScore">0</div>
                </div>
                <div class="vrei-tier" id="vreiTier">SIMMERING</div>
                <div class="vrei-quote-box">
                    <span id="vreiQuote">Loading Rick wisdom...</span>
                    <span class="vrei-quote-attribution">— Vacation Rick</span>
                </div>
            </div>

        </div>

    </div>

    <script>
        const slides = document.querySelectorAll('.carousel-slide');
        const dotsContainer = document.getElementById('dots');
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
            dotsContainer.appendChild(dot);
        });

        let currentSlide = 0;

        function goToSlide(n) {
            const dots = document.querySelectorAll('.carousel-dot');
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = (n + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        setInterval(() => goToSlide(currentSlide + 1), 4000);

        const quotes = [
            { text: "Florida: where the sun never stops shining and the fun never ends.", emoji: "☀️" },
            { text: "Friends who vacation together, stay together.", emoji: "👯" },
            { text: "Life is better in flip-flops and with friends by your side.", emoji: "🩴" },
            { text: "Salty air, sandy hair, and friends everywhere.", emoji: "🌊" },
            { text: "A vacation without friends is just a trip. With friends? It's a memory.", emoji: "📸" },
            { text: "Florida: bringing people together one beach day at a time.", emoji: "🏝️" },
            { text: "Good times + crazy friends = amazing memories.", emoji: "✨" },
            { text: "The beach is calling and we must go... together.", emoji: "🐚" },
            { text: "Vitamin Sea and friendship—the best remedy.", emoji: "💙" },
            { text: "Making a splash with your favorite people.", emoji: "💦" }
        ];

        function updateCountdown() {
            const diff = new Date("July 11, 2026 00:00:00").getTime() - new Date().getTime();
            document.getElementById("days").textContent = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").textContent = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
            document.getElementById("minutes").textContent = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, '0');
            document.getElementById("seconds").textContent = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
            return diff;
        }

        function displayQuote() {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById("quote").textContent = q.text;
            document.getElementById("emoji").textContent = q.emoji;
        }

        // ===== VREI: Vacation Rick Energy Index =====
        // Score climbs from 0 -> 100 as days-left shrinks.
        // Tiers mirror the daily-bot logic: 15+ days = Simmering, 4-14 = Building, 0-3 (or trip started) = Full Send.
        // Jokes live in vrei-jokes.json so they can be edited without touching this file.

        let vreiJokes = null;

        async function loadVreiJokes() {
            try {
                const res = await fetch('./vrei-jokes.json');
                vreiJokes = await res.json();
            } catch (err) {
                console.error('Could not load vrei-jokes.json, falling back to placeholder.', err);
                vreiJokes = {
                    simmering: ["Vacation Rick is currently loading his wisdom. Please stand by."],
                    building: ["Vacation Rick is currently loading his wisdom. Please stand by."],
                    fullSend: ["Vacation Rick is currently loading his wisdom. Please stand by."]
                };
            }
        }

        function getVreiTier(daysLeft) {
            if (daysLeft > 15) return 'simmering';
            if (daysLeft >= 4) return 'building';
            return 'fullSend'; // covers 0-3 days and negative (trip started)
        }

        function getVreiScore(daysLeft) {
            // Scale: 21 days out (page baseline) -> low score. 0 days -> 100.
            // Clamp so far-out days don't go below a small idle hum, and past trip-start it pins at 100.
            const maxDays = 21; // matches the trip's typical "far out" window
            const clamped = Math.max(0, Math.min(maxDays, daysLeft));
            const score = Math.round(100 - (clamped / maxDays) * 100);
            return Math.max(5, score); // never show a dead-zero, Rick is never truly at 0
        }

        function updateVrei(diffMs) {
            const daysLeft = diffMs / (1000 * 60 * 60 * 24); // fractional, for smoother climb
            const tier = getVreiTier(daysLeft);
            const score = getVreiScore(daysLeft);

            const tierLabels = {
                simmering: 'SIMMERING',
                building: 'BUILDING',
                fullSend: 'FULL SEND'
            };

            document.getElementById('vreiBarFill').style.width = score + '%';
            document.getElementById('vreiScore').textContent = score;
            document.getElementById('vreiTier').textContent = tierLabels[tier];

            return tier;
        }

        function displayVreiQuote(tier) {
            if (!vreiJokes) return; // jokes haven't loaded yet, skip this tick
            const bank = vreiJokes[tier];
            const quote = bank[Math.floor(Math.random() * bank.length)];
            document.getElementById('vreiQuote').textContent = quote;
        }

        let lastVreiTier = null;

        function refreshVrei() {
            const diff = updateCountdown();
            const tier = updateVrei(diff);
            // Only re-roll the quote when the tier changes, or on first load,
            // so it doesn't shuffle every second while the bar just ticks.
            if (tier !== lastVreiTier) {
                displayVreiQuote(tier);
                lastVreiTier = tier;
            }
        }

        async function startVrei() {
            await loadVreiJokes();
            refreshVrei();
        }

        startVrei();
        displayQuote();
        setInterval(refreshVrei, 1000);
    </script>

</body>
</html>
