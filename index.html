<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdido Key Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 40px;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .countdown-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            color: white;
        }

        .countdown-number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .countdown-label {
            font-size: 0.9em;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quote-container {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            margin-top: 30px;
        }

        .quote-text {
            font-size: 1.3em;
            color: #333;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .quote-emoji {
            font-size: 2em;
            margin: 10px 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .countdown {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .countdown-item {
                padding: 15px;
            }

            .countdown-number {
                font-size: 1.8em;
            }

            .quote-text {
                font-size: 1em;
            }
        }.playlist-section {
  max-width: 560px;
  margin: 2rem auto;
  padding: 1.75rem;
  background: #1e3448;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.12);
}
.playlist-section h2 {
  margin: 0 0 0.2rem;
  font-size: 1.5rem;
  color: #ffffff;
  font-weight: 700;
}
.subhead {
  font-size: 0.875rem;
  color: rgba(255,255,255,0.6);
  margin: 0 0 1.4rem;
}
.song-form {
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
  margin-bottom: 1.5rem;
}
.song-form input {
  padding: 0.7rem 1rem;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #ffffff;
  font-size: 1rem;
  outline: none;
}
.song-form input::placeholder { color: rgba(255,255,255,0.38); }
.song-form button {
  padding: 0.75rem;
  border-radius: 10px;
  border: none;
  background: #f4a261;
  color: #1a1a1a;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
}
.song-submit-msg { font-size: 0.85rem; color: #6ee7b7; min-height: 1.2em; }
.playlist-divider {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35);
  margin-bottom: 0.75rem;
}
.playlist-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem; }
.playlist-list li {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.65rem 0.9rem;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  color: #ffffff;
}
.song-icon { font-size: 1.1rem; flex-shrink: 0; }
.song-info { flex: 1; }
.song-title { font-weight: 600; font-size: 0.95rem; color: #ffffff; }
.song-artist { font-size: 0.8rem; color: rgba(255,255,255,0.55); margin-top: 1px; }
.song-by { font-size: 0.75rem; color: rgba(255,255,255,0.3); white-space: nowrap; }
.playlist-empty { font-size: 0.875rem; color: rgba(255,255,255,0.4); text-align: center; padding: 1.25rem 0; list-style: none; }

    </style>
</head>
<body>
    <div class="container">
        <h1>🏖️ Perdido Key</h1>
        <p class="subtitle">July 11 – 18, 2026</p>

        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">0</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">0</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">0</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">0</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <div class="quote-container">
            <div class="quote-emoji" id="emoji">🎉</div>
            <p class="quote-text" id="quote">Loading the good vibes...</p>
        </div>
    </div>

    <script>
        const quotes = [
            { text: "Florida: where the sun never stops shining and the fun never ends.", emoji: "☀️" },
            { text: "Friends who vacation together, stay together.", emoji: "👯" },
            { text: "Life is better in flip-flops and with friends by your side.", emoji: "🩴" },
            { text: "Salty air, sandy hair, and friends everywhere.", emoji: "🌊" },
            { text: "A vacation without friends is just a trip. With friends? It's a memory.", emoji: "📸" },
            { text: "Florida: bringing people together one beach day at a time.", emoji: "🏝️" },
            { text: "Good times + crazy friends = amazing memories.", emoji: "✨" },
            { text: "The beach is calling and we must go... together.", emoji: "🐚" },
            { text: "Vitamin Sea and friendship—the best remedy.", emoji: "💙" },
            { text: "Making a splash with your favorite people.", emoji: "💦" }
        ];

        function getRandomQuote() {
            return quotes[Math.floor(Math.random() * quotes.length)];
        }

        function updateCountdown() {
            const targetDate = new Date("July 11, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const difference = targetDate - now;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / 1000 / 60) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            document.getElementById("days").textContent = days;
            document.getElementById("hours").textContent = String(hours).padStart(2, '0');
            document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
            document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
        }

        function displayQuote() {
            const quote = getRandomQuote();
            document.getElementById("quote").textContent = quote.text;
            document.getElementById("emoji").textContent = quote.emoji;
        }

        // Initial display
        updateCountdown();
        displayQuote();

        // Update countdown every second
        setInterval(updateCountdown, 1000);
    </script>
    
    <section class="playlist-section">
  <h2>🎵 Vacation Playlist</h2>
  <p class="subhead">Suggest a song for the trip. We'll add it to the list.</p>
  <div class="song-form">
    <input type="text" id="songTitle" placeholder="Song title" maxlength="80" />
    <input type="text" id="songArtist" placeholder="Artist" maxlength="80" />
    <input type="text" id="songSubmitter" placeholder="Your name (optional)" maxlength="40" />
    <button onclick="submitSong()">Add to Playlist</button>
    <div class="song-submit-msg" id="songMsg"></div>
  </div>
  <div class="playlist-divider">The List So Far</div>
  <ul class="playlist-list" id="playlistList">
    <li class="playlist-empty">Loading songs...</li>
  </ul>
</section>
<script>
  async function loadSongs() {
    try {
      const res = await fetch('./songs.json?t=' + Date.now());
      const songs = await res.json();
      const list = document.getElementById('playlistList');
      if (!songs || songs.length === 0) {
        list.innerHTML = '<li class="playlist-empty">No songs yet — be the first!</li>';
        return;
      }
      list.innerHTML = songs.map(s => `
        <li>
          <span class="song-icon">🎶</span>
          <div class="song-info">
            <div class="song-title">${esc(s.title)}</div>
            <div class="song-artist">${esc(s.artist)}</div>
          </div>
          ${s.submitter ? `<span class="song-by">— ${esc(s.submitter)}</span>` : ''}
        </li>
      `).join('');
    } catch (e) {
      document.getElementById('playlistList').innerHTML = '<li class="playlist-empty">No songs yet — be the first!</li>';
    }
  }
  function submitSong() {
    const title = document.getElementById('songTitle').value.trim();
    const artist = document.getElementById('songArtist').value.trim();
    const submitter = document.getElementById('songSubmitter').value.trim();
    const msg = document.getElementById('songMsg');
    if (!title || !artist) {
      msg.style.color = '#fca5a5';
      msg.textContent = 'Please enter both a song and artist.';
      return;
    }
    console.log('NEW SONG:', JSON.stringify({ title, artist, submitter }));
    msg.style.color = '#6ee7b7';
    msg.textContent = '✓ Got it! Adam will add this to the list.';
    document.getElementById('songTitle').value = '';
    document.getElementById('songArtist').value = '';
    document.getElementById('songSubmitter').value = '';
  }
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  loadSongs();
</script>

</body>
</html>
