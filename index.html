<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdido Key — T−2 Weeks</title>
    <meta property="og:image" content="https://acoclr1979.github.io/perdido-key-countdown/Photo-00-PKC.jpeg">
    <meta property="og:title" content="Perdido Key — T−2 Weeks">
    <meta property="og:description" content="July 11–18, 2026 🏖️">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* ===== Mosaic background ===== */
        .mosaic-bg {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 25vh);
            z-index: 0;
        }

        .mosaic-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .mosaic-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 5, 40, 0.72);
            z-index: 1;
        }

        /* ===== Main content ===== */
        .main {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 50px 30px 60px;
            max-width: 640px;
            width: 100%;
        }

        /* ===== T−2 WEEKS hero ===== */
        .hero-eyebrow {
            font-size: 0.85em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
            margin-bottom: 12px;
        }

        .hero-t2 {
            font-size: clamp(5.5rem, 22vw, 13rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -4px;
            color: #fff;
            text-shadow: 0 4px 40px rgba(0,0,0,0.5);
        }

        .hero-weeks {
            font-size: clamp(1.4rem, 5vw, 2.8rem);
            font-weight: 200;
            letter-spacing: clamp(8px, 2vw, 18px);
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .hero-dates {
            font-size: 0.9em;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            margin-bottom: 52px;
        }

        /* ===== Countdown ===== */
        .countdown {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .countdown-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 22px 20px 18px;
            border-radius: 14px;
            min-width: 88px;
            flex: 1;
            max-width: 130px;
        }

        .countdown-number {
            font-size: 2.6em;
            font-weight: 700;
            display: block;
            line-height: 1;
            margin-bottom: 7px;
        }

        .countdown-label {
            font-size: 0.7em;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* ===== VREI ===== */
        .vrei-container {
            max-width: 420px;
            margin: 0 auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 14px;
            padding: 20px 24px 22px;
            text-align: left;
        }

        .vrei-label {
            font-size: 0.72em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
            text-align: center;
        }

        .vrei-meter-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .vrei-bar-track {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.12);
            border-radius: 5px;
            overflow: hidden;
        }

        .vrei-bar-fill {
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #ffb347 0%, #ff5e62 100%);
            transition: width 1s ease-in-out;
            width: 0%;
        }

        .vrei-score {
            font-weight: 800;
            font-size: 1.15em;
            color: #ffb347;
            min-width: 40px;
            text-align: right;
        }

        .vrei-tier {
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.75em;
            color: #ffb347;
            margin-bottom: 12px;
        }

        .vrei-quote-box {
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            padding: 12px 14px;
            font-style: italic;
            color: rgba(255,255,255,0.82);
            font-size: 0.9em;
            line-height: 1.55;
        }

        .vrei-quote-attribution {
            display: block;
            margin-top: 6px;
            font-style: normal;
            font-weight: 700;
            font-size: 0.8em;
            letter-spacing: 1px;
            color: #ffb347;
        }

        @media (max-width: 600px) {
            .mosaic-bg {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(5, 20vh);
            }
            .main { padding: 40px 20px 50px; }
            .hero-t2 { letter-spacing: -2px; }
            .countdown { gap: 10px; }
            .countdown-item { padding: 16px 10px 14px; min-width: 0; }
            .countdown-number { font-size: 1.9em; }
            .vrei-container { padding: 16px 18px 18px; }
        }
    </style>
</head>
<body>

    <div class="mosaic-bg">
        <img src="./Photo-00-PKC.jpeg" alt="">
        <img src="./IMG_1144.jpeg" alt="">
        <img src="./Photo-1-PKC.jpeg" alt="">
        <img src="./Photo-2-PKC.jpeg" alt="">
        <img src="./Photo-3-PKC.jpeg" alt="">
        <img src="./Photo-4-PKC.jpeg" alt="">
        <img src="./Photo-5-PKC.jpeg" alt="">
        <img src="./Photo-6-PKC.jpeg" alt="">
        <img src="./Photo-7-PKC.JPEG" alt="">
        <img src="./Photo-8-PKC.jpeg" alt="">
        <img src="./Photo-9-PKC.jpeg" alt="">
        <img src="./Photo-10-PKC.jpeg" alt="">
        <img src="./Photo-11-PKC.jpeg" alt="">
        <img src="./Photo-12-PKC.jpeg" alt="">
        <img src="./Photo-13-PKC.jpeg" alt="">
        <img src="./Photo-14-PKC.jpeg" alt="">
        <img src="./Photo-15-PKC.jpeg" alt="">
        <img src="./Photo-17-PKC.jpeg" alt="">
        <img src="./Photo-18-PKC.jpg" alt="">
        <img src="./Photo-19-PKC.jpeg" alt="">
    </div>
    <div class="mosaic-overlay"></div>

    <div class="main">

        <p class="hero-eyebrow">🏖️ Perdido Key</p>
        <div class="hero-t2">T&minus;2</div>
        <div class="hero-weeks">Weeks</div>
        <p class="hero-dates">July 11 &ndash; 18, 2026</p>

        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">0</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">0</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">0</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">0</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <div class="vrei-container">
            <p class="vrei-label">📈 Vacation Rick Energy Index</p>
            <div class="vrei-meter-row">
                <div class="vrei-bar-track">
                    <div class="vrei-bar-fill" id="vreiBarFill"></div>
                </div>
                <div class="vrei-score" id="vreiScore">0</div>
            </div>
            <div class="vrei-tier" id="vreiTier">BUILDING</div>
            <div class="vrei-quote-box">
                <span id="vreiQuote">Loading Rick wisdom...</span>
                <span class="vrei-quote-attribution">— Vacation Rick</span>
            </div>
        </div>

    </div>

    <script>
        function updateCountdown() {
            const diff = new Date("July 11, 2026 00:00:00").getTime() - new Date().getTime();
            const daysLeft = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("days").textContent = Math.max(daysLeft, 0);
            document.getElementById("hours").textContent = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
            document.getElementById("minutes").textContent = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, '0');
            document.getElementById("seconds").textContent = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
            return diff;
        }

        // MANUAL OVERRIDE: set to a number (0–100) to pin the VREI score. null = normal.
        const VREI_SCORE_OVERRIDE = null;

        let vreiJokes = null;

        async function loadVreiJokes() {
            try {
                const res = await fetch('./vrei-jokes.json');
                vreiJokes = await res.json();
            } catch (err) {
                vreiJokes = {
                    simmering: ["Vacation Rick is currently loading his wisdom. Please stand by."],
                    building: ["Vacation Rick is currently loading his wisdom. Please stand by."],
                    fullSend: ["Vacation Rick is currently loading his wisdom. Please stand by."]
                };
            }
        }

        function getVreiTier(daysLeft) {
            if (daysLeft > 15) return 'simmering';
            if (daysLeft >= 4) return 'building';
            return 'fullSend';
        }

        function getVreiScore(daysLeft) {
            if (VREI_SCORE_OVERRIDE !== null) return VREI_SCORE_OVERRIDE;
            const maxDays = 21;
            const clamped = Math.max(0, Math.min(maxDays, daysLeft));
            return Math.max(5, Math.round(100 - (clamped / maxDays) * 100));
        }

        function updateVrei(diffMs) {
            const daysLeft = diffMs / (1000 * 60 * 60 * 24);
            const tier = getVreiTier(daysLeft);
            const score = getVreiScore(daysLeft);
            const tierLabels = { simmering: 'SIMMERING', building: 'BUILDING', fullSend: 'FULL SEND' };
            document.getElementById('vreiBarFill').style.width = score + '%';
            document.getElementById('vreiScore').textContent = score;
            document.getElementById('vreiTier').textContent = tierLabels[tier];
            return tier;
        }

        function displayVreiQuote(tier) {
            if (!vreiJokes) return;
            const bank = vreiJokes[tier];
            document.getElementById('vreiQuote').textContent = bank[Math.floor(Math.random() * bank.length)];
        }

        let lastVreiTier = null;

        function refreshVrei() {
            const diff = updateCountdown();
            const tier = updateVrei(diff);
            if (tier !== lastVreiTier) {
                displayVreiQuote(tier);
                lastVreiTier = tier;
            }
        }

        async function start() {
            await loadVreiJokes();
            refreshVrei();
        }

        start();
        setInterval(refreshVrei, 1000);
    </script>

</body>
</html>
